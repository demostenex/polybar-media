; polybar-module.ini
; Cole este bloco no seu config.ini e adicione `midia` na modules-left/center/right.
;
; Dependências: playerctl, python3, Nerd Font (Material Design Icons)

[module/midia]
type = custom/script
exec = ~/.config/polybar/scripts/media_polybar.py --mode module
interval = 2
tail = false

; Clique esquerdo  → play/pause
click-left = ~/.config/polybar/scripts/media_polybar.py --mode play-pause &
; Clique direito   → próxima mídia
click-right = ~/.config/polybar/scripts/media_polybar.py --mode next &
; Clique do meio   → mídia anterior
click-middle = ~/.config/polybar/scripts/media_polybar.py --mode previous &
; Scroll cima      → avança 5s
scroll-up = ~/.config/polybar/scripts/media_polybar.py --mode forward &
; Scroll baixo     → retrocede 5s
scroll-down = ~/.config/polybar/scripts/media_polybar.py --mode backward &
